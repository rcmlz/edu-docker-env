# mkdir ${HOME}/jupyter
# docker compose -f docker-compose-rcmlz-edu-jupyter-full.yml up
services:
  jupyter-edu-full:
      image: rcmlz/edu-jupyter-full
      ports:
          - 8888:8888
      volumes:
          - type: bind
            source: ${HOME}/jupyter
            target: /home/jovyan
      user: root
      environment:
          JUPYTER_ENABLE_LAB: "yes"
          JUPYTER_TOKEN: "go" # effectively disable authentication by setting to an easy password 0000
          GRANT_SUDO: "yes"
