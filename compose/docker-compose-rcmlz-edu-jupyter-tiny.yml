# mkdir ${HOME}/jupyter
# docker compose -f docker-compose-rcmlz-edu-jupyter-tiny.yml up
# docker compose -f docker-compose-rcmlz-edu-jupyter-tiny.yml down --remove-orphans
# open http://localhost:8888
services:
  jupyter-edu-tiny:
      image: rcmlz/edu-jupyter-tiny
      ports:
          - 8888:8888
      volumes:
          - type: bind
            source: ${HOME}/jupyter
            target: /home/jovyan/work
      user: root
      environment:
          JUPYTER_ENABLE_LAB: "yes"
          JUPYTER_TOKEN: "go" # effectively disable authentication by setting to an easy password 0000
          GRANT_SUDO: "yes"
